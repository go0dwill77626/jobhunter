version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - db_storage:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # --- IP ADDRESS CHANGES BELOW ---
      - N8N_HOST=${EXTERNAL_IP}           # Use your GCP External IP here
      - N8N_PORT=5678
      - N8N_PROTOCOL=http                 # Changed from https
      - N8N_SECURE_COOKIE=false           # REQUIRED for logging in via IP/HTTP
      - WEBHOOK_URL=http://${EXTERNAL_IP}:5678/
      - NODE_ENV=production
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      - db

volumes:
  db_storage:
  n8n_storage: